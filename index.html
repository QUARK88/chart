<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/x-icon" href="./assets/icons/icon.png">
    <title>Chart</title>
    <meta property="og:site_name" content="quark88.github.io/chart">
    <meta property="og:title" content="Chart">
    <meta property="og:type" content="website">
    <meta property="og:description" content="You can make charts with this.">
    <meta property="og:url" content="https://quark88.github.io/chart">
    <meta property="og:image" content="https://quark88.github.io/chart/assets/icons/embed.png">
    <meta name="theme-color" content="#00a0ff" data-react-helmet="true">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
    <div id="colorPopup"></div>
    <datalist id="nodeNames"></datalist>
    <div id="menu">
        <input type="text" placeholder="Node name">
        <div class="menuGrid">
            <button>Ideology</button>
            <button>Faction</button>
            <button>Current faction</button>
        </div>
        <div id="menuColors"></div>
        <input type="text" placeholder="Node hyperlink">
        <div id="menuPrecursors">
            <input type="text" placeholder="Precursor node">
        </div>
        <div class="menuGrid">
            <button>Delete</button>
            <button>Cancel</button>
            <button>Save</button>
        </div>
    </div>
    <div id="warning">
        <h1>READ THIS</h1>
        <h2>RIGHT CLICK to add a new node</h2>
        <h2>LEFT CLICK AND DRAG to move an existing node</h2>
        <h2>RIGHT CLICK A NODE to edit its properties</h2>
        <h2>Separate a precursor and its arrow text with a SEMICOLON (;)</h2>
        <h2>Don't try using this on mobile, this is made for PC</h2>
        <button onclick="initializeDisplay()">OK i get it</button>
    </div>
    <button id="settingsToggle" onclick="toggleSettings()">See settings</button>
    <div id="chart">
        <div id="nodes"></div>
        <div id="arrows"></div>
    </div>
    <div id="settings">
        <div id="settingsContainer">
            <div class="buttonContainer">
                <button onclick="exportData()">Export data</button>
                <button onclick="importData()">Import data</button>
                <button onclick="adjustChartSize()">Adjust chart size</button>
                <button onclick="setFont('aptly')" style="font-family:aptly">Aptly font</button>
                <button onclick="setFont('expressway')" style="font-family:expressway">Expressway font</button>
                <button onclick="setFont('gobold')" style="font-family:gobold">Gobold font</button>
            </div>
            <div class="inputContainer">
                <label for="widthPicker">Chart width:</label>
                <input id="widthPicker" type="number" step="25" min="25" value="2000" name="widthPicker">
                <label for="heightPicker">Chart height:</label>
                <input id="heightPicker" type="number" step="25" min="25" value="2000" name="heightPicker">
            </div>
            <div id="settingsColors"></div>
            <div class="buttonContainer">
                <button id="screenshotButton">Save as PNG image</button>
                <button id="resetButton">Reset all data</button>
                <button onclick="toggleGridBackground()">Toggle grid</button>
                <button>Useless button</button>
                <button>Useless button</button>
                <button>Useless button</button>
            </div>
            <div class="inputContainer">
                <label for="fontSize">Font size:</label>
                <input id="fontSize" type="number" step=".5" min="0" value="16" name="fontSize">
                <label for="gridGranularity">Grid granularity:</label>
                <input id="gridGranularity" type="number" step="1" min="1" value="25" name="gridGranularity">
            </div>
            <div class="buttonContainer">
                <button id="canchart">Load Canada chart</button>
                <button id="uschart">Load America chart</button>
                <button id="frchart">Load France chart</button>
                <button id="ruschart">Load Russia chart</button>
                <button id="gerchart">Load Germany chart</button>
                <button id="engchart">Load Britain chart</button>
            </div>
        </div>
    </div>
</body>
<script src="./script.js"></script>
<script src="./screenshot.js" type="module"></script>

</html>
